services:
  - type: web
    name: codesync-server
    env: docker
    region: oregon
    plan: free
    rootDir: server
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
